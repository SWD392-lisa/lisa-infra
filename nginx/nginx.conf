events { worker_connections 1024; }

http {
    upstream curriculum  { server lisa-curriculum-service:8080; }
    upstream reposervice { server lisa-repo-service:8082; }

    server {
        listen 80;
        server_name localhost;

        # ── Curriculum API ───────────────────────────────────
        location /api/curriculum/ {
            proxy_pass         http://curriculum;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            client_max_body_size 25M;   # để upload file .docx lớn
        }

        # ── Repo API ─────────────────────────────────────────
        location /api/repos/ {
            proxy_pass         http://reposervice;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Swagger UI – Curriculum (:8080/swagger-ui.html) ──
        location /curriculum/swagger-ui/ {
            proxy_pass http://curriculum/swagger-ui/;
            proxy_set_header Host $host;
        }
        location /curriculum/api-docs {
            proxy_pass http://curriculum/api-docs;
            proxy_set_header Host $host;
        }

        # ── Swagger UI – Repo (:8082/swagger-ui.html) ────────
        location /repos/swagger-ui/ {
            proxy_pass http://reposervice/swagger-ui/;
            proxy_set_header Host $host;
        }
        location /repos/api-docs {
            proxy_pass http://reposervice/api-docs;
            proxy_set_header Host $host;
        }

        # ── H2 Console (dev) ──────────────────────────────────
        location /h2-console/ {
            proxy_pass http://curriculum/h2-console/;
            proxy_set_header Host $host;
        }

        # ── Gateway health ────────────────────────────────────
        location /health {
            return 200 '{"status":"LISA Gateway OK","services":["curriculum","repo"]}';
            add_header Content-Type application/json;
        }

        # ── Index: links đến Swagger ──────────────────────────
        location = / {
            return 200 '<!DOCTYPE html><html><body>
<h2>LISA Platform</h2>
<ul>
  <li><a href="http://localhost:8080/swagger-ui.html">Curriculum Swagger UI (port 8080)</a></li>
  <li><a href="http://localhost:8082/swagger-ui.html">Repo Swagger UI (port 8082)</a></li>
  <li><a href="/health">Gateway Health</a></li>
</ul>
</body></html>';
            add_header Content-Type text/html;
        }
    }
}

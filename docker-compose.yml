services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lisa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lisa_secret}
      POSTGRES_DB: ${POSTGRES_ADMIN_DB:-postgres}
      CURRICULUM_DB_NAME: ${CURRICULUM_DB_NAME:-lisadb}
      REALTIME_DB_NAME: ${REALTIME_DB_NAME:-realtime_db}
      USER_PAYMENT_DB_NAME: ${USER_PAYMENT_DB_NAME:-user_payment_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - lisa-network

  curriculum-service:
    build:
      context: ../lisa-curriculum-service/lisa-curriculum-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${CURRICULUM_DB_NAME:-lisadb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lisa}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-lisa_secret}
      DB_DRIVER: org.postgresql.Driver
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_CACHE_TYPE: ${CURRICULUM_SPRING_CACHE_TYPE:-simple}
      REDIS_HOST: ${CURRICULUM_REDIS_HOST:-localhost}
      REDIS_PORT: ${CURRICULUM_REDIS_PORT:-6379}
      REDIS_PASSWORD: ${CURRICULUM_REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      USER_SERVICE_BASE_URL: http://user-payment-service:${USER_PAYMENT_PORT:-5000}
      REALTIME_SERVICE_BASE_URL: http://realtime-service:${REALTIME_PORT:-3000}
      REALTIME_SOCKET_URL: http://realtime-service:${REALTIME_PORT:-3000}
      REALTIME_SESSION_JOIN_EVENT: ${REALTIME_SESSION_JOIN_EVENT:-session.join}
      LMS_AUTO_SWITCH_SCAN_INTERVAL_MS: ${LMS_AUTO_SWITCH_SCAN_INTERVAL_MS:-60000}
      LMS_END_SESSION_ON_LAST_SUBLEVEL: ${LMS_END_SESSION_ON_LAST_SUBLEVEL:-false}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      SPRING_H2_CONSOLE_ENABLED: "false"
    ports:
      - "${CURRICULUM_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lisa-network

  realtime-service:
    build:
      context: ..
      dockerfile: lisa-infra/docker/realtime-service.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-lisa}:${POSTGRES_PASSWORD:-lisa_secret}@postgres:5432/${REALTIME_DB_NAME:-realtime_db}?schema=public
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      AGORA_APP_ID: ${AGORA_APP_ID:-}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE:-}
      AGORA_TOKEN_EXPIRE_SECONDS: ${AGORA_TOKEN_EXPIRE_SECONDS:-3600}
      AGORA_REST_CUSTOMER_ID: ${AGORA_REST_CUSTOMER_ID:-}
      AGORA_REST_CUSTOMER_SECRET: ${AGORA_REST_CUSTOMER_SECRET:-}
      AGORA_RECORDING_UID: ${AGORA_RECORDING_UID:-9999}
      AGORA_RECORDING_MODE: ${AGORA_RECORDING_MODE:-composite}
      AGORA_RECORDING_STORAGE_VENDOR: ${AGORA_RECORDING_STORAGE_VENDOR:-}
      AGORA_RECORDING_STORAGE_CONFIG: ${AGORA_RECORDING_STORAGE_CONFIG:-}
      WEB_CLIENT_BASE_URL: ${WEB_CLIENT_BASE_URL:-http://localhost:5173}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_STREAM_SIGNING_KEY: ${CLOUDFLARE_STREAM_SIGNING_KEY:-}
      CLOUDFLARE_STREAM_SIGNING_KEY_ID: ${CLOUDFLARE_STREAM_SIGNING_KEY_ID:-}
      CLOUDFLARE_STREAM_CUSTOMER_CODE: ${CLOUDFLARE_STREAM_CUSTOMER_CODE:-}
    ports:
      - "${REALTIME_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lisa-network

  user-payment-service:
    build:
      context: ..
      dockerfile: lisa-infra/docker/user-payment-service.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:${USER_PAYMENT_PORT:-5000}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${USER_PAYMENT_DB_NAME:-user_payment_db};Username=${POSTGRES_USER:-lisa};Password=${POSTGRES_PASSWORD:-lisa_secret}
      JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      JwtSettings__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      REALTIME_SERVICE_URL: http://realtime-service:${REALTIME_PORT:-3000}/
      REALTIME_SERVICE_AUTH_POLICY: ${REALTIME_SERVICE_AUTH_POLICY:-Default}
      REALTIME_SERVICE_CLUSTER_ID: ${REALTIME_SERVICE_CLUSTER_ID:-realtime-cluster}
      REALTIME_SERVICE_AGORA_PATH: /api/agora/{**catch-all}
      REALTIME_SERVICE_SOCKETIO_PATH: /socket.io/{**catch-all}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:4200}
      BaseCallbackUrl: ${BASE_CALLBACK_URL:-http://localhost:5000}
      SePay__UrlSePay: ${SEPAY_URL:-https://pay-sandbox.sepay.vn/v1/checkout/init}
      SePay__ApiKey: ${SEPAY_API_KEY:-}
      SePay__MerchantId: ${SEPAY_MERCHANT_ID:-}
      SePay__SecretKey: ${SEPAY_SECRET_KEY:-}
      SePay__IsSandbox: ${SEPAY_IS_SANDBOX:-true}
      SePay__SuccessUrl: ${SEPAY_SUCCESS_URL:-http://localhost:5173/payment/success}
      SePay__ErrorUrl: ${SEPAY_ERROR_URL:-http://localhost:5173/payment/error}
      SePay__CancelUrl: ${SEPAY_CANCEL_URL:-http://localhost:5173/payment/cancel}
    ports:
      - "${USER_PAYMENT_PORT:-5000}:${USER_PAYMENT_PORT:-5000}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/${USER_PAYMENT_PORT:-5000}'"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - lisa-network

  frontend-app:
    build:
      context: ..
      dockerfile: lisa-infra/docker/frontend-app.Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_VITE_API_BASE_URL:-http://localhost:5000}
        VITE_API_URL: ${FRONTEND_VITE_API_URL:-http://localhost:5000}
        VITE_LMS_API_URL: ${FRONTEND_VITE_LMS_API_URL:-http://localhost:8080/api/lms}
        VITE_REALTIME_URL: ${FRONTEND_VITE_REALTIME_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      curriculum-service:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
      user-payment-service:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - lisa-network

networks:
  lisa-network:
    driver: bridge

volumes:
  postgres-data:
